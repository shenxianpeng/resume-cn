experiences:
    - role: Software Engineer
      time: 2018 - Present
      company: Rocket Software, 大连
      details: |
        负责 Multi-Value 产品的构建，建立 CI/CD Pipeline，为团队提供无人值守的自动化构建、安装、扫描、测试等服务。提高团队研发效率和质量。

          - 通过建立 CI/CD Pipeline 实现所有产品的构建、发布的统一性，保障交付高质量、没有法律风险的产品。
          - 主导 CI/CD 设计及实施、制定Git分支策略和最佳实现、倡导并推荐最佳实践以及优化工作流程。
          - 负责基础设施（Jenkins, Bamboo, Artifactory以及VM）的搭建，配置，管理，备份，以及自动化维护。

    - role: Software Engineer In Test
      time: 2015 - 2018
      company: Rocket Software, 大连
      details: |
        Rocket Discover 自动化测试带头人，带领测试团队从零开展自动化测试，提高回归测试效率。

          - 负责自动化框架选择，自动化测试用例设计以及流程制定以及性能自动化测试用例设计，性能脚本的录制和编写。
          - 负责自动化测试、性能测试与 Jenkins 集成，维护测试的相关 Git 仓库、测试技术招聘、新人培训。

    - role: 软件测试工程师
      time: 2012 - 2014
      company: 京东商城, 北京
      details: |
        京东商城财务组测试工程师，帮助测试团队设计自动化测试，负责自动测试的开发和维护。

          - 负责京东财务相关系统的功能测试，自动化测试脚本的开发以及与 CI 工具集成。

    - role: 软件测试工程师
      time: 2011 - 2011
      company: 东软集团, 北京
      details: |
        软件测试，负责过两个大型项目的软件测试工作。

          - 外汇管理局，该项目整个团队大概100人，测试团队有20人左右，该项目采用 CMMI3 软件进行管理，负责用例编写和功能测试。
          - 中移动云平台，负责云平台里虚拟机管理测试用例编写和功能测试。

