career-profile:
    title: 个人总结
    summary: |
      - 多年自动化测试开发和持续集成经验。负责RocketSoftware MultiValue(MV)数据库产品自动化构建、发布、DevOps流水线规划、设计和设施。
      - 熟悉研发、测试、构建、发布流程；熟练使用DevOps工具，如Bitbucket，GitHub，Jenkins，Artifactory，Ansible，Polaris，BlackDuck，SonarQube等。
      - 维护和管理包含Windows/Linux/Unix系统的构建环境，以及持续集成。

