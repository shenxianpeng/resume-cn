experiences:
    - role: Build | DevOps Engineer
      time: 2018 - Present
      company: Rocket Software, 大连
      details: |
        作为 Multi-Value 产品的构建工程师， 负责 MV Server 团队所有产品（UniVerse, UniData, U2 Common Clients, U2 Toolkit for .NET）的构建和发布，CI/CD 规划，工具类的选择，代码实施。

          - 负责所有 Git 仓库的维护和分支策略制定。
          - 负责所有平台（Win, Lin, AIX, HPUX, Solaris SPACR, Solaris x86）构建机器的维护, Jenkins, Bamboo, Artifactory 服务的搭建，管理，维护，备份。
          - 向客户交付高质量的 GA release, Diagnostic release, Custom release, Hotfix, Alpha, Beta testing package, PE 等版本。
          - 向客户交付正确的产品构建，包括正确的修复程序，没有法律问题，无病毒，正确的文档，Escrow，Codesign。
          - 负责工具调研，倡导 DevOps 最佳实践，培训开发、测试如何使用 Git，Jenkins，Bamboo，Artifactory 使用并在 Wiki 中组织使用文档。
          - 作为 Key Stakeholder 参与 MV Server 的每年规划会议、制定 DevOps 规划以及工作流程优化。

    - role: Software Engineer In Test
      time: 2015 - 2018
      company: Rocket Software, 大连
      details: |
        作为 Rocket Discover 测试自动化带头人，带领测试团队从零开始设计自动化测试用例，自动化测试框架的选择、部署以及代码实现。

          - 负责并参与 Rocket Discover 自动化测试用例设计、自动化框架选择，部署以及开发流程制定。
          - 负责并参与 Rocket Discover 性能自动化测试用例设计，性能脚本的录制和编写。
          - 负责自动化测试、性能测试与 Jenkins 集成，维护测试的相关 Git 仓库、测试技术招聘、新人培训。

    - role: 软件测试工程师
      time: 2012 - 2014
      company: 京东商城, 北京
      details: |
        作为京东商城财务组的核心测试工程师，帮助测试团队设计自动化测试，负责自动测试的开发和维护。

          - 负责京东财务相关系统的功能测试，自动化测试脚本的开发以及与 CI 工具集成。

