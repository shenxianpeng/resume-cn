experiences:
    - role: Software Engineer
      time: 2018 - Present
      company: Rocket Software, 大连
      details: |
        作为Multi-Value产品的开发工程师，负责产品DevOps基础设施建设，为团队提供无人值守的自动化构建、安装服务，为团队提高开发效率，节省人力成本。

          - 通过建立 CI/CD Pipeline，接管了 Multi-Value Server/Client 所有产品的构建、发布，保障向客户交付高质量的、没有法律问题、无病毒的产品构建。
          - 主导 CI/CD 设计及实施，Git维护和分支策略制定、工具类选择，倡导 DevOps 的最佳实践以及工作流程优化，分享 Git，Jenkins，Bamboo，Artifactory 使用。
          - 负责Jenkins, Bamboo, Artifactory服务的搭建，配置，管理，备份，以及创建和维护所有平台(Windows, Linux, AIX, HPUX, Solaris SPACR, Solaris x86)构建机器。

    - role: Software Engineer In Test
      time: 2015 - 2018
      company: Rocket Software, 大连
      details: |
        作为 Rocket Discover 自动化测试带头人，带领测试团队从零开始开展自动化，提高回归测试效率。

          - 负责自动化框架选择，自动化测试用例设计以及流程制定以及性能自动化测试用例设计，性能脚本的录制和编写。
          - 负责自动化测试、性能测试与Jenkins集成，维护测试的相关Git仓库、测试技术招聘、新人培训。

    - role: 软件测试工程师
      time: 2012 - 2014
      company: 京东商城, 北京
      details: |
        京东商城财务组测试工程师，帮助测试团队设计自动化测试，负责自动测试的开发和维护。

          - 负责京东财务相关系统的功能测试，自动化测试脚本的开发以及与CI工具集成。

