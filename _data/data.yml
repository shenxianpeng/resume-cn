    summary: |
      - 九年软件测试经验，曾在东软、京东商城、Rocket Software 从事软件测试。负责过产品自动化测试和性能测试测试，包括自动化设计、实施和集成。
      - 有持久的学习热情和学习能力，从测试转为开发，主导产品的的自动化构建、发布、DevOps 基础设施建设，帮助开发解决开发中的痛点。
      - 了解整个软件生命周期，熟悉产品测试、研发、构建、发布流程、DevOps工具类的选择、多个平台的使用和构建，精通持续集成。

